<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParaAura — Çevrimdışı</title>
  <link rel="stylesheet" href="vendor/nvds/tokens.css">
  <link rel="stylesheet" href="vendor/nvds/ds.css">
  <link rel="stylesheet" href="theme.css">
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);
      color:var(--text);font-family:var(--font-sans);padding:var(--sp-5)}
    .nv-offline{max-width:420px;text-align:center;padding:var(--sp-7) var(--sp-6)}
    .nv-offline h1{font-family:var(--font-serif);font-size:var(--fs-2xl);margin:0 0 var(--sp-3)}
    .nv-offline p{color:var(--text-muted);line-height:1.6;margin:0 0 var(--sp-5)}
  </style>
</head>
<body>
  <div class="nv-card nv-offline">
    <h1>Çevrimdışısınız</h1>
    <p>İnternet bağlantısı kurulamadı. Önbellekteki son kurlar gösterilebilir.
       Bağlantı döndüğünde sayfayı yenileyin.</p>
    <button class="nv-btn nv-btn--primary" onclick="location.reload()">Yeniden Dene</button>
  </div>
</body>
</html>
